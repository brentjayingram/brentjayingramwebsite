name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package Lambda function
        run: cd terraform && zip -j ai_chat.zip chat.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -var="bucket_name=${{ secrets.BUCKET_NAME }}"
        working-directory: terraform

      - name: Import existing API Gateway stage
        run: terraform import -var="bucket_name=${{ secrets.BUCKET_NAME }}" aws_api_gateway_stage.visitor_api_stage API_GATEWAY_ID/dev || true
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="bucket_name=${{ secrets.BUCKET_NAME }}"
        working-directory: terraform
