name: Deploy Website
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Package Lambda function
        run: cd terraform && zip -j ai_chat.zip chat.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        working-directory: terraform
        
      - name: Terraform Plan
        run: terraform plan -var="bucket_name=${{ secrets.BUCKET_NAME }}"
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="bucket_name=${{ secrets.BUCKET_NAME }}"
        working-directory: terraform
        
      - name: Sync website files
        run: aws s3 sync Frontend/ s3://${{ secrets.BUCKET_NAME }} --delete
